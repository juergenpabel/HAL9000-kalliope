[uwsgi]
socket=/var/run/uwsgi/app/enclosure-console/dummy
processes=1
single-interpreter = true
enable-threads = true
fs-reload = %(chdir)
worker-reload-mercy = 5
plugins = python3
python-worker-override = /data/git/hal9000:enclosure/console/uwsgi.py
pyargv = console.ini
pythonpath = /data/git/hal9000:enclosure/package
pythonpath = /data/git/hal9000:enclosure/console/package
chdir = /data/git/hal9000:enclosure/console/
uid = hal9000
gid = uwsgi
logfile-chmod = 644
